name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['18', '20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: install (zero deps — this is a no-op assertion)
        run: |
          # This package declares no dependencies. `npm install` should be a
          # no-op; assert nothing landed in node_modules.
          npm install --ignore-scripts
          test ! -d node_modules || [ -z "$(ls -A node_modules 2>/dev/null)" ] || (echo "unexpected node_modules contents" && ls -la node_modules && exit 1)

      - name: run tests
        run: npm test

      - name: npm pack + inspect
        run: |
          npm pack
          ls -la *.tgz
          tar -tzf claude-atone-*.tgz | sort
          # The installer copies bin/updown.mjs at runtime; a missing animation
          # would throw ENOENT for every user. Assert it ships.
          tar -tzf claude-atone-*.tgz | grep -q 'package/bin/updown.mjs' || (echo "FAIL: bin/updown.mjs missing from tarball" && exit 1)
          tar -tzf claude-atone-*.tgz | grep -q 'package/bin/on-stop.mjs' || (echo "FAIL: bin/on-stop.mjs missing from tarball" && exit 1)
          echo "OK: runner + animation present in tarball"

      - name: assert no lifecycle scripts in published package
        run: |
          mkdir -p /tmp/pkg-inspect
          tar -xzf claude-atone-*.tgz -C /tmp/pkg-inspect
          cat /tmp/pkg-inspect/package/package.json
          node -e "
            const pkg = require('/tmp/pkg-inspect/package/package.json');
            const forbidden = ['preinstall','install','postinstall','preuninstall','postuninstall','preprepare','prepare','postprepare'];
            const scripts = pkg.scripts || {};
            const found = forbidden.filter(s => s in scripts);
            if (found.length) { console.error('FAIL: forbidden lifecycle scripts present:', found); process.exit(1); }
            console.log('OK: no forbidden lifecycle scripts');
          "

      - name: assert no runtime dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = Object.keys(pkg.dependencies || {});
            if (deps.length) { console.error('FAIL: unexpected runtime dependencies:', deps); process.exit(1); }
            console.log('OK: zero runtime dependencies');
          "

      - name: smoke test cli --dry-run
        # --dry-run on non-macOS prints the macOS preview and exits 0; on macOS
        # it previews against the runner's home. A non-zero exit is a real
        # regression, so it is NOT masked.
        run: node bin/cli.mjs --dry-run

      - name: smoke test cli --help
        run: node bin/cli.mjs --help

      - name: smoke test cli --version
        run: node bin/cli.mjs --version

  publish:
    name: publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC-based npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: upgrade npm (OIDC trusted publishing needs >=11.5.1)
        run: npm install -g npm@latest

      - name: verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: run tests one more time
        run: npm test

      - name: publish with provenance (OIDC trusted publishing)
        run: npm publish --provenance --access public
